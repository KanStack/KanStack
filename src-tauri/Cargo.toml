[package]
name = "kanstack"
version = "0.3.0"
description = "A minimal local-first kanban board viewer"
authors = ["Galen Green"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
notify = "6"
serde = { version = "1", features = ["derive"] }
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"

[profile.dev]
incremental = true

[profile.release]
opt-level = 3
strip = true
lto = true
