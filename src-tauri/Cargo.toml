[package]
name = "kanstack"
version = "0.2.1"
description = "A local-first kanban board application"
authors = ["Galen Green"]
edition = "2021"
rust-version = "1.75"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
trash = "5.2.3"

[profile.dev]
incremental = true

[profile.release]
opt-level = 3
lto = true
strip = true
